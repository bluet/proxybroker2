# Build standalone executables across Linux/Windows/macOS via PyInstaller,
# using uv to manage the toolchain (replaces Poetry as of #105).
# https://github.com/pyinstaller/pyinstaller/issues/6296#issuecomment-962446033

name: Build Executable

on: [push, pull_request]

jobs:
  build_exe:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.14"]  # Default to current Python; revert to 3.13 if PyInstaller breaks
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.13"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install project + pyinstaller
        # pyinstaller is build-only tooling, not a project runtime dep, so
        # install it on top of the locked env via `uv pip install` rather
        # than adding it to pyproject.toml.
        run: |
          uv sync --locked
          uv pip install pyinstaller
      - name: Compile python to exe
        run: |
          mkdir -p build;
          cd build;
          if [ "$RUNNER_OS" == 'Windows' ]; then
            PATH_SEPARATOR=";"
          else
            PATH_SEPARATOR=":"
          fi
          uv run pyinstaller --onefile --name proxybroker-${RUNNER_OS}-$(arch) --add-data "../proxybroker/data${PATH_SEPARATOR}data" --workpath ./tmp --distpath . --clean ../py2exe_entrypoint.py;
          rm -rf tmp *.spec;
      - name: Archive proxybroker artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: proxybroker-build-artifacts-${{ matrix.os }}
          path: build/proxybroker-*-*
