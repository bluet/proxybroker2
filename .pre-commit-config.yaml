# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
default_language_version:
    # `python3` (any 3.x) so contributors on any of the supported Python
    # versions (3.10-3.14) can run pre-commit without installing an extra
    # interpreter. Pinning a specific minor breaks the others.
    python: python3
fail_fast: false
repos:
    # Basic file checks
    -   repo: https://github.com/pre-commit/pre-commit-hooks
        rev: v6.0.0
        hooks:
            -   id: trailing-whitespace
            -   id: end-of-file-fixer
            -   id: check-yaml
            -   id: check-toml
            -   id: check-json
            -   id: check-added-large-files
            -   id: check-merge-conflict
            -   id: debug-statements  # Catch print() and pdb
            -   id: mixed-line-ending
                args: ['--fix=lf']

    # Ruff - fast Python linter and formatter
    -   repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.15.12
        hooks:
            # Run the linter
            -   id: ruff
                args: [--fix, --unsafe-fixes, --select, "E9,F63,F7,F82,B,S,I,UP", --ignore, "S101", --per-file-ignores, "tests/*:S104"]
            # Run the formatter
            -   id: ruff-format

    # Security scanning - important for a proxy tool
    -   repo: https://github.com/PyCQA/bandit
        rev: 1.9.4
        hooks:
            -   id: bandit
                args: [-ll, -i, -x, tests]
                name: bandit (security check)

    # Auto-regenerate requirements.txt from uv.lock so Snyk (which doesn't
    # yet support uv.lock — snyk/snyk-python-plugin#251) has a manifest it
    # can scan. Local hook so it runs against whatever uv is on PATH.
    # Only triggers when uv.lock or pyproject.toml changed.
    -   repo: local
        hooks:
            -   id: uv-export-requirements
                name: uv export → requirements.txt (for Snyk)
                language: system
                entry: uv export --format requirements-txt --no-dev --no-emit-project --output-file requirements.txt
                files: ^(uv\.lock|pyproject\.toml)$
                pass_filenames: false
